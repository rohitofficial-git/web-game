<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMPLE REAL-TIME CHESS</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        
        body {
            background: #2d2a1e;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        
        .game-container {
            background: #3a2c1b;
            padding: 25px;
            border-radius: 16px;
            border: 3px solid #b88b4a;
            max-width: 700px;
            width: 100%;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: #ffd966;
            margin: 0;
            font-size: 2.5em;
        }
        
        .connection-area {
            background: #1e1a0f;
            border: 2px solid #b88b4a;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .room-display {
            background: #2a2418;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
        }
        
        .room-code {
            font-size: 3em;
            font-weight: bold;
            color: #ffd966;
            letter-spacing: 10px;
            margin: 10px 0;
        }
        
        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 15px 0;
        }
        
        button {
            padding: 15px;
            background: #5d3f1f;
            border: 2px solid #b88b4a;
            color: #ffd966;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }
        
        button:hover {
            background: #7a5629;
        }
        
        button.big {
            grid-column: span 2;
            background: #2e5a2e;
        }
        
        .status {
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
            font-weight: bold;
        }
        
        .status.waiting { background: #5a4a2e; color: #ffd966; }
        .status.connected { background: #2e5a2e; color: #b3ffb3; }
        .status.disconnected { background: #5a2e2e; color: #ffb3b3; }
        
        .turn-indicator {
            text-align: center;
            padding: 15px;
            margin: 15px 0;
            border-radius: 8px;
            font-size: 1.3em;
            font-weight: bold;
        }
        
        .turn-white { background: #f0f0f0; color: #000; }
        .turn-black { background: #222; color: #ffd966; }
        
        .chess-board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            aspect-ratio: 1;
            border: 4px solid #4a3720;
            margin: 20px 0;
        }
        
        .square {
            aspect-ratio: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: min(45px, 8vw);
            cursor: pointer;
        }
        
        .square.light { background: #eed9b2; }
        .square.dark { background: #8b5f3c; }
        
        .square.selected {
            background: #b3d9a0 !important;
            box-shadow: inset 0 0 0 4px #2d5e2d;
        }
        
        .square.possible {
            background: #9fc5e8 !important;
            box-shadow: inset 0 0 0 4px #1a4d8c;
        }
        
        .online-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #6bff6b;
            border-radius: 50%;
            margin-right: 5px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
        
        .footer {
            text-align: center;
            color: #b88b4a;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>♜ SIMPLE LIVE CHESS ♞</h1>
        </div>
        
        <!-- Connection Area -->
        <div class="connection-area">
            <div class="button-grid">
                <button onclick="createRoom()">🎮 CREATE ROOM</button>
                <button onclick="joinRoomPrompt()">🔑 JOIN ROOM</button>
            </div>
            
            <div id="roomDisplay" style="display: none;" class="room-display">
                <div style="color: #c9b27e;">Your Room Code:</div>
                <div class="room-code" id="roomCode">ABCD</div>
                <button onclick="copyRoomCode()" style="width: 100%;">📋 COPY CODE</button>
            </div>
            
            <div id="joinInput" style="display: none;" class="room-display">
                <input type="text" id="joinCode" placeholder="Enter 6-digit code" style="width: 100%; padding: 15px; font-size: 1.5em; text-align: center; background: #2a2418; border: 2px solid #b88b4a; color: #ffd966; margin-bottom: 10px;">
                <button onclick="joinRoom()" style="width: 100%;">CONNECT</button>
            </div>
            
            <div id="connectionStatus" class="status disconnected">
                🔴 Not connected
            </div>
        </div>
        
        <!-- Game Info -->
        <div id="gameSection" style="display: none;">
            <div class="turn-indicator turn-white" id="turnDisplay">
                WHITE'S TURN
            </div>
            
            <div style="text-align: center; margin: 10px 0; color: #c9b27e;">
                <span id="opponentStatus">⏳ Waiting for opponent...</span>
            </div>
            
            <!-- Chess Board -->
            <div class="chess-board" id="chessboard"></div>
            
            <button onclick="resetBoard()" style="width: 100%; margin-top: 10px;">🔄 NEW GAME</button>
        </div>
        
        <div class="footer">
            <span class="online-dot"></span> Real-time • Direct connection • No server
        </div>
    </div>

    <script>
        // Chess pieces
        const PIECES = {
            'K': '♔', 'Q': '♕', 'R': '♖', 'B': '♗', 'N': '♘', 'P': '♙',
            'k': '♚', 'q': '♛', 'r': '♜', 'b': '♝', 'n': '♞', 'p': '♟'
        };
        
        // Starting board
        const INITIAL_BOARD = [
            ['r', 'n', 'b', 'q', 'k', 'b', 'n', 'r'],
            ['p', 'p', 'p', 'p', 'p', 'p', 'p', 'p'],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['', '', '', '', '', '', '', ''],
            ['P', 'P', 'P', 'P', 'P', 'P', 'P', 'P'],
            ['R', 'N', 'B', 'Q', 'K', 'B', 'N', 'R']
        ];
        
        // Game state
        let board = JSON.parse(JSON.stringify(INITIAL_BOARD));
        let currentTurn = 'w';
        let selectedRow = null;
        let selectedCol = null;
        let possibleMoves = [];
        
        // Connection state
        let myColor = null;
        let roomCode = null;
        let isConnected = false;
        
        // Simple signaling using localStorage (works for same browser)
        // For different browsers/computers, we need a real signaling server
        // This is a simplified version - in production you'd use a proper signaling server
        
        function createRoom() {
            roomCode = Math.random().toString(36).substring(2, 8).toUpperCase();
            myColor = 'w';
            
            document.getElementById('roomDisplay').style.display = 'block';
            document.getElementById('roomCode').innerText = roomCode;
            document.getElementById('joinInput').style.display = 'none';
            document.getElementById('connectionStatus').innerHTML = '🟡 Waiting for opponent to join...';
            document.getElementById('connectionStatus').className = 'status waiting';
            
            // Start polling for opponent
            startPolling();
        }
        
        function joinRoomPrompt() {
            document.getElementById('joinInput').style.display = 'block';
            document.getElementById('roomDisplay').style.display = 'none';
        }
        
        function joinRoom() {
            const code = document.getElementById('joinCode').value.toUpperCase();
            if (code.length < 4) {
                alert('Enter a valid room code');
                return;
            }
            
            roomCode = code;
            myColor = 'b';
            
            document.getElementById('connectionStatus').innerHTML = '🟡 Connecting to room...';
            document.getElementById('connectionStatus').className = 'status waiting';
            
            // Notify host
            localStorage.setItem('chess_join_' + roomCode, Date.now());
            
            // Start polling
            startPolling();
        }
        
        function startPolling() {
            // Check for game updates every second
            const interval = setInterval(() => {
                // Check if opponent joined
                const joinTime = localStorage.getItem('chess_join_' + roomCode);
                if (joinTime && !isConnected) {
                    isConnected = true;
                    document.getElementById('connectionStatus').innerHTML = '🟢 Connected! Opponent joined';
                    document.getElementById('connectionStatus').className = 'status connected';
                    document.getElementById('gameSection').style.display = 'block';
                    document.getElementById('opponentStatus').innerHTML = '<span class="online-dot"></span> Opponent online';
                    
                    // Send initial board
                    saveGameState();
                }
                
                // Check for moves
                const saved = localStorage.getItem('chess_game_' + roomCode);
                if (saved) {
                    try {
                        const data = JSON.parse(saved);
                        if (data.board && JSON.stringify(board) !== JSON.stringify(data.board)) {
                            // Opponent made a move
                            board = data.board;
                            currentTurn = data.currentTurn;
                            selectedRow = null;
                            selectedCol = null;
                            possibleMoves = [];
                            renderBoard();
                            updateTurnDisplay();
                        }
                    } catch (e) {}
                }
            }, 1000);
        }
        
        function saveGameState() {
            localStorage.setItem('chess_game_' + roomCode, JSON.stringify({
                board: board,
                currentTurn: currentTurn
            }));
        }
        
        // Get possible moves
        function getPossibleMoves(row, col) {
            let piece = board[row][col];
            if (!piece) return [];
            
            let moves = [];
            let isWhite = piece === piece.toUpperCase();
            let type = piece.toLowerCase();
            
            switch(type) {
                case 'p':
                    let dir = isWhite ? -1 : 1;
                    let startRow = isWhite ? 6 : 1;
                    
                    if (row + dir >= 0 && row + dir < 8 && !board[row + dir][col]) {
                        moves.push([row + dir, col]);
                        if (row === startRow && !board[row + 2*dir][col]) {
                            moves.push([row + 2*dir, col]);
                        }
                    }
                    
                    for (let dc of [-1, 1]) {
                        let newCol = col + dc;
                        if (newCol >= 0 && newCol < 8 && row + dir >= 0 && row + dir < 8) {
                            let target = board[row + dir][newCol];
                            if (target && (target === target.toLowerCase()) === isWhite) {
                                moves.push([row + dir, newCol]);
                            }
                        }
                    }
                    break;
                    
                case 'r':
                case 'q':
                    for (let [dr, dc] of [[-1,0], [1,0], [0,-1], [0,1]]) {
                        for (let i = 1; i < 8; i++) {
                            let r = row + dr * i;
                            let c = col + dc * i;
                            if (r < 0 || r >= 8 || c < 0 || c >= 8) break;
                            
                            if (!board[r][c]) {
                                moves.push([r, c]);
                            } else {
                                if ((board[r][c] === board[r][c].toLowerCase()) === isWhite) {
                                    moves.push([r, c]);
                                }
                                break;
                            }
                        }
                    }
                    if (type === 'r') break;
                    
                case 'b':
                case 'q':
                    for (let [dr, dc] of [[-1,-1], [-1,1], [1,-1], [1,1]]) {
                        for (let i = 1; i < 8; i++) {
                            let r = row + dr * i;
                            let c = col + dc * i;
                            if (r < 0 || r >= 8 || c < 0 || c >= 8) break;
                            
                            if (!board[r][c]) {
                                moves.push([r, c]);
                            } else {
                                if ((board[r][c] === board[r][c].toLowerCase()) === isWhite) {
                                    moves.push([r, c]);
                                }
                                break;
                            }
                        }
                    }
                    break;
                    
                case 'n':
                    let jumps = [[-2,-1], [-2,1], [-1,-2], [-1,2], [1,-2], [1,2], [2,-1], [2,1]];
                    for (let [dr, dc] of jumps) {
                        let r = row + dr;
                        let c = col + dc;
                        if (r >= 0 && r < 8 && c >= 0 && c < 8) {
                            if (!board[r][c] || (board[r][c] === board[r][c].toLowerCase()) === isWhite) {
                                moves.push([r, c]);
                            }
                        }
                    }
                    break;
                    
                case 'k':
                    for (let dr of [-1,0,1]) {
                        for (let dc of [-1,0,1]) {
                            if (dr === 0 && dc === 0) continue;
                            let r = row + dr;
                            let c = col + dc;
                            if (r >= 0 && r < 8 && c >= 0 && c < 8) {
                                if (!board[r][c] || (board[r][c] === board[r][c].toLowerCase()) === isWhite) {
                                    moves.push([r, c]);
                                }
                            }
                        }
                    }
                    break;
            }
            
            return moves;
        }
        
        function isMyTurn() {
            if (!isConnected) return false;
            return (currentTurn === myColor);
        }
        
        function handleClick(row, col) {
            if (!isConnected) {
                alert('Connect to an opponent first!');
                return;
            }
            
            if (!isMyTurn()) {
                alert('Wait for your opponent!');
                return;
            }
            
            if (selectedRow === null) {
                // Select piece
                let piece = board[row][col];
                if (piece && ((myColor === 'w' && piece === piece.toUpperCase()) || 
                             (myColor === 'b' && piece === piece.toLowerCase()))) {
                    selectedRow = row;
                    selectedCol = col;
                    possibleMoves = getPossibleMoves(row, col);
                    renderBoard();
                }
                return;
            }
            
            // Try to move
            let isValidMove = possibleMoves.some(([r, c]) => r === row && c === col);
            
            if (isValidMove) {
                // Make move
                board[row][col] = board[selectedRow][selectedCol];
                board[selectedRow][selectedCol] = '';
                
                // Switch turns
                currentTurn = currentTurn === 'w' ? 'b' : 'w';
                
                // Save to localStorage
                saveGameState();
            }
            
            // Clear selection
            selectedRow = null;
            selectedCol = null;
            possibleMoves = [];
            renderBoard();
            updateTurnDisplay();
        }
        
        function renderBoard() {
            let html = '';
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    let piece = board[i][j];
                    let pieceChar = piece ? PIECES[piece] : '';
                    
                    let classes = `square ${(i + j) % 2 === 0 ? 'light' : 'dark'}`;
                    
                    if (selectedRow === i && selectedCol === j) {
                        classes += ' selected';
                    }
                    
                    if (possibleMoves.some(([r, c]) => r === i && c === j)) {
                        classes += board[i][j] ? ' capture' : ' possible';
                    }
                    
                    html += `<div class="${classes}" onclick="handleClick(${i}, ${j})">${pieceChar}</div>`;
                }
            }
            document.getElementById('chessboard').innerHTML = html;
        }
        
        function updateTurnDisplay() {
            const turnDisplay = document.getElementById('turnDisplay');
            turnDisplay.innerHTML = currentTurn === 'w' ? 'WHITE\'S TURN' : 'BLACK\'S TURN';
            turnDisplay.className = `turn-indicator ${currentTurn === 'w' ? 'turn-white' : 'turn-black'}`;
        }
        
        function resetBoard() {
            board = JSON.parse(JSON.stringify(INITIAL_BOARD));
            currentTurn = 'w';
            selectedRow = null;
            selectedCol = null;
            possibleMoves = [];
            renderBoard();
            updateTurnDisplay();
            saveGameState();
        }
        
        function copyRoomCode() {
            navigator.clipboard.writeText(roomCode);
            alert('Room code copied! Share with your friend.');
        }
        
        // Initial render
        renderBoard();
    </script>
</body>
</html>
